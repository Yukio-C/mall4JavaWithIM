worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # ==============================
    # 1. 商城用户端 (Port 80)
    # ==============================
    server {
        listen       80;
        server_name  localhost;

        # 前端静态资源
        location / {
            # 请确保此路径指向您实际的 dist 目录
            root   D:/project/graduation/mall-system/mall-user/dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 后端接口代理
        location /api/ {
            proxy_pass http://127.0.0.1:9090/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ==============================
    # 2. 商家管理端 (Port 81)
    # ==============================
    server {
        listen       81;
        server_name  localhost;

        location / {
            root   D:/project/graduation/mall-system/mall-admin/dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:9090/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
